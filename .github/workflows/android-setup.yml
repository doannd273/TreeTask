name: Android Setup

# Khai báo đây là một Reusable Workflow (Workflow dùng chung)
on:
  workflow_call:
    inputs:
      # Lệnh Gradle sẽ được truyền từ file gọi bên ngoài (ví dụ: ./gradlew detekt)
      command:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo source code về máy ảo
      - name: Checkout
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Java 17 (Bắt buộc cho Gradle 8+)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # Bước 3: Cài đặt và tự động xử lý Cache cho Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Bước 4: Cấp quyền thực thi cho file gradlew (Dành riêng cho môi trường Linux/Mac)
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Bước 5: Chạy lệnh được truyền vào từ biến "command"
      - name: Run command
        run: ${{ inputs.command }}