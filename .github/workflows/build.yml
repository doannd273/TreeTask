name: TreeTask CI/CD

# Chạy CI khi có người push code lên main/develop
# Hoặc khi có ai đó tạo Pull Request đòi merge vào main/develop
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Ép chạy Nodejs.24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-check:
    name: Build & Code Quality Check
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
      # Bước 1: Kéo source code của bạn về máy ảo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 2: Setup môi trường Java 17 (Chuẩn bắt buộc cho Gradle 8+)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Bước 3: Cache Gradle (Cực kỳ quan trọng để các lần CI sau chạy nhanh hơn)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # THÊM BƯỚC NÀY ĐỂ TỰ ĐỘNG CẤP QUYỀN THỰC THI CHO GRADLEW
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Bước 4: Kiểm tra xem code có được format chuẩn chưa (Spotless/Ktlint)
      # Lưu ý: Dùng spotlessCheck để kiểm tra, nếu lỗi CI sẽ chuyển màu Đỏ
      - name: Check Code Format (Spotless)
        run: ./gradlew spotlessCheck --no-daemon

      # Bước 5: Tìm Code Smells & Bugs tiềm ẩn với Detekt
      - name: Check Code Quality (Detekt)
        run: ./gradlew detekt --no-daemon

      # Bước 6: Build thử App xem có bị lỗi Crash lúc compile không
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
