name: TreeTask CI/CD

# Chạy CI khi có người push code lên main/develop
# Hoặc khi có ai đó tạo Pull Request đòi merge vào main/develop
on:
  pull_request:
    branches: [ "main", "develop" ]

# Ép chạy Nodejs.24 để tránh cảnh báo từ GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# HUỶ CI CŨ KHI CÓ COMMIT MỚI (Tối ưu tài nguyên)
concurrency:
  # Gom nhóm các tiến trình dựa trên "Tên workflow" + "Tên branch hiện tại"
  group: ${{ github.workflow }}-${{ github.ref }}
  # Bật cờ huỷ tiến trình đang chạy dở
  cancel-in-progress: true

jobs:
  # Job 1: Kiểm tra format code (Spotless). Chạy song song độc lập với Job 2.
  lint:
    uses: ./.github/workflows/android-setup.yml
    with:
      command: ./gradlew spotlessCheck

  # Job 2: Kiểm tra Code Smells (Detekt). Chạy song song độc lập với Job 1.
  detekt:
    uses: ./.github/workflows/android-setup.yml
    with:
      command: ./gradlew detekt

  # Job 3: Build thử App (assembleDebug). 
  # Lệnh "needs: [ lint, detekt ]" bắt buộc Job này phải đợi Job 1 và Job 2 chạy Xanh xong thì mới được chạy.
  # Tránh lãng phí số phút CI nếu code đã bị lỗi format từ đầu.
  build:
    uses: ./.github/workflows/android-setup.yml
    needs: [ lint, detekt ]
    with:
      command: ./gradlew assembleDebug
